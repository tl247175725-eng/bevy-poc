name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'assets/**'
      - 'Cargo.*'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'assets/**'
      - 'Cargo.*'
      - '.github/workflows/ci.yml'

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 5
  CARGO_HTTP_TIMEOUT: 180

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Bevy deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y pkg-config libudev-dev libasound2-dev

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: bevy-poc-v6
          cache-on-failure: true
          cache-targets: false

      - name: cargo test
        run: cargo test 2>&1

      - name: smoke test
        run: cargo run -- --smoke-test 2>&1
