name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 5
  CARGO_HTTP_TIMEOUT: 180
  CARGO_INCREMENTAL: 1

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Bevy system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y pkg-config libudev-dev libasound2-dev

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: bevy-poc-v4
          cache-targets: false

      - name: cargo test
        run: cargo test 2>&1

      - name: smoke test
        run: cargo run -- --smoke-test 2>&1
