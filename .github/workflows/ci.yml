name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 5
  CARGO_HTTP_TIMEOUT: 180

jobs:
  # ── Phase 1: 轻量门（~30s）──────────────────────────
  # cargo check 只做类型检查，不生成代码，不跑测试
  # 拦住：缺导入、函数不存在、类型不匹配
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: bevy-poc-gate
          cache-targets: false
      - name: cargo check
        run: cargo check 2>&1

  # ── Phase 2: 完整测试（依赖 Phase 1 通过）─────────
  # Phase 1 挂了这步根本不跑
  test:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Bevy deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y pkg-config libudev-dev libasound2-dev
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: bevy-poc-test
          cache-targets: false
      - name: cargo test
        run: cargo test 2>&1
      - name: smoke test
        run: cargo run -- --smoke-test 2>&1
