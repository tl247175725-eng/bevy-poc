name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 5
  CARGO_HTTP_TIMEOUT: 180

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Bevy system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y pkg-config libudev-dev libasound2-dev

      - name: Cache Rust deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run unit tests
        run: cargo test 2>&1

      - name: Show test failures (if any)
        if: failure()
        run: cargo test 2>&1 | grep -A 5 "FAILED\|panicked\|assertion" || true

      - name: Run smoke test
        run: cargo run -- --smoke-test 2>&1
