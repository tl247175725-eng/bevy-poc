name: Trigger Cursor Automation

on:
  push:
    branches: [main]
    paths:
      - 'AIMemory/current.md'

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call Cursor Automation webhook
        run: |
          curl -X POST "${{ secrets.CURSOR_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.CURSOR_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"event":"push","repository":"tl247175725-eng/bevy-poc"}'
